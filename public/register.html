<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unirme a la lista — Kōhi</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
  <a class="brand" href="index.html">K<span>ō</span>hi</a>
</header>

<main class="page">
  <div class="card">
    <div id="formState">
      <h2>Unirme a la lista</h2>
      <p class="card-subtitle">Resérvate un lugar antes de la apertura.</p>

      <form id="registerForm" novalidate>
        <div class="field">
          <label for="name">Nombre</label>
          <input type="text" id="name" name="name" autocomplete="name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" autocomplete="new-password" required>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirmar contraseña</label>
          <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Unirme a la lista</button>
      </form>

      <div id="message" class="message"></div>

      <p class="form-footer">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </div>

    <div id="successState" class="success-state">
      <h2>¡Estás en la lista!</h2>
      <p class="card-subtitle">Tu posición</p>
      <p class="position">#<span id="positionValue"></span></p>
      <a class="btn btn-primary btn-block" href="login.html">Iniciar sesión</a>
    </div>
  </div>
</main>

<script>
const form = document.getElementById('registerForm');
const messageEl = document.getElementById('message');
const submitBtn = document.getElementById('submitBtn');
const formState = document.getElementById('formState');
const successState = document.getElementById('successState');
const positionValue = document.getElementById('positionValue');

function showMessage(text, type) {
  messageEl.textContent = text;
  messageEl.className = `message show ${type}`;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  messageEl.className = 'message';

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (!name || !email || !password || !confirmPassword) {
    showMessage('Completa todos los campos.', 'error');
    return;
  }

  if (password !== confirmPassword) {
    showMessage('Las contraseñas no coinciden.', 'error');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Enviando...';

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      showMessage(data.error || 'No se pudo completar el registro.', 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Unirme a la lista';
      return;
    }

    positionValue.textContent = data.position;
    formState.style.display = 'none';
    successState.classList.add('show');
  } catch (err) {
    showMessage('Error de conexión. Inténtalo de nuevo.', 'error');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Unirme a la lista';
  }
});
</script>
</body>
</html>
